<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6"/></pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/></marker>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #e5e7eb; }
      .muted { fill: #94a3b8; font-size: 18px; }
      .tiny { fill: #94a3b8; font-size: 13px; }
      .title { fill: #f8fafc; font-size: 42px; font-weight: 800; letter-spacing: -1px; }
      .section { fill: #f8fafc; font-size: 20px; font-weight: 700; }
      .label { fill: #f8fafc; font-size: 16px; font-weight: 700; }
      .box { fill: #0f172a; stroke: #334155; stroke-width: 1.3; rx: 14; }
      .accent { stroke: #22d3ee; } .violet { stroke: #a78bfa; } .green { stroke: #34d399; } .amber { stroke: #fbbf24; } .rose { stroke: #fb7185; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/><rect width="1200" height="520" fill="url(#grid)" opacity="0.75"/>
  <text x="60" y="72" class="title">Agent Scorecard</text><text x="62" y="110" class="muted">Trace-first evaluation for whether an agent deserves more tokens, permissions, and trust.</text>
  <rect x="70" y="200" width="210" height="120" class="box accent"/><text x="100" y="242" class="section">Trace</text><text x="100" y="272" class="tiny">user ask · messages · tools</text><text x="100" y="296" class="tiny">artifacts · failures</text>
  <rect x="355" y="200" width="210" height="120" class="box violet"/><text x="385" y="242" class="section">Evidence checks</text><text x="385" y="272" class="tiny">promised action vs tool action</text><text x="385" y="296" class="tiny">read-back · tests · privacy</text>
  <rect x="640" y="200" width="210" height="120" class="box rose"/><text x="670" y="242" class="section">Score bands</text><text x="670" y="272" class="tiny">invest · supervise</text><text x="670" y="296" class="tiny">limit · do not delegate</text>
  <rect x="925" y="200" width="210" height="120" class="box amber"/><text x="955" y="242" class="section">Decision</text><text x="955" y="272" class="tiny">more autonomy or less</text><text x="955" y="296" class="tiny">based on real work</text>
  <path d="M280 260 H347" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/><path d="M565 260 H632" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/><path d="M850 260 H917" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="72" y="420" class="muted">This is the quality gate inside StevenOS: agents earn trust by leaving verifiable artifacts, not by sounding confident.</text>
</svg>
